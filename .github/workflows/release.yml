name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  # Run linting before creating release
  lint:
    uses: ./.github/workflows/common-lint.yml

  test-windows-311:
    needs: lint
    uses: ./.github/workflows/common-test.yml
    with:
      python-version: '3.11'
      os: windows-latest

  test-remaining:
    needs: test-windows-311
    strategy:
      matrix:
        include:
          - python-version: '3.11'
            os: macos-latest
          - python-version: '3.13'
            os: macos-latest
          - python-version: '3.13'
            os: windows-latest
    uses: ./.github/workflows/common-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}

  bump-version:
    runs-on: ubuntu-latest
    needs: [lint, test-windows-311, test-remaining]
    outputs:
      new_version: ${{ steps.calc_version.outputs.new_version }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep -oP '__version__\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' src/__version__.py)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: calc_version
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="${major}.${minor}.${patch}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in src/__version__.py
        run: |
          sed -i 's/__version__\s*=\s*"[0-9]\+\.[0-9]\+\.[0-9]\+"/__version__ = "${{ steps.calc_version.outputs.new_version }}"/' src/__version__.py
          echo "Updated src/__version__.py with version ${{ steps.calc_version.outputs.new_version }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add src/__version__.py
          git commit -m "Bump version to ${{ steps.calc_version.outputs.new_version }}"
          git pull --rebase
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.calc_version.outputs.new_version }}" -m "Release v${{ steps.calc_version.outputs.new_version }}"
          git push origin "v${{ steps.calc_version.outputs.new_version }}"

  # Build executables after version bump
  build-windows:
    needs: bump-version
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and checkout tag
        run: |
          git fetch --tags
          git checkout v${{ needs.bump-version.outputs.new_version }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pkgconf pyinstaller
          pip install -r requirements.txt

      - name: Build Windows executable
        run: |
          pyinstaller --clean release/reMarkableSync.spec

      - name: Create Windows distribution package
        run: |
          mkdir reMarkableSync-Windows
          xcopy /E /I dist\reMarkableSync reMarkableSync-Windows\reMarkableSync
          copy README.md reMarkableSync-Windows\
          powershell Compress-Archive -Path reMarkableSync-Windows -DestinationPath reMarkableSync-Windows.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: reMarkableSync-Windows
          path: reMarkableSync-Windows.zip

  build-macos:
    needs: bump-version
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and checkout tag
        run: |
          git fetch --tags
          git checkout v${{ needs.bump-version.outputs.new_version }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: |
          brew install cairo pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build macOS executable
        run: |
          pyinstaller --clean release/reMarkableSync.spec

      - name: Create macOS distribution package
        run: |
          mkdir -p reMarkableSync-macOS
          # Copy the entire reMarkableSync directory (one-folder mode)
          if [ -d "dist/reMarkableSync" ]; then
            cp -r dist/reMarkableSync reMarkableSync-macOS/
          fi
          cp README.md reMarkableSync-macOS/
          (cd reMarkableSync-macOS && zip -r ../reMarkableSync-macOS.zip .)

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: reMarkableSync-macOS
          path: reMarkableSync-macOS.zip

  # Create release with executables attached
  create-release:
    needs: [bump-version, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: reMarkableSync-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: reMarkableSync-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: Release v${{ needs.bump-version.outputs.new_version }}
          body: |
            ## Release v${{ needs.bump-version.outputs.new_version }}

            ### Installation

            #### macOS (Homebrew — recommended)
            ```bash
            brew tap jeffsteinbok/remarkablesync
            brew install remarkablesync
            ```

            #### pip (all platforms)
            ```bash
            pip install --upgrade remarkablesync
            ```

            #### Manual download
            Download the appropriate package for your platform below:
            - **Windows**: `reMarkableSync-Windows.zip`
            - **macOS**: `reMarkableSync-macOS.zip`

            Extract the archive and run the `reMarkableSync` executable.

            ### Upgrading

            ```bash
            # Homebrew
            brew upgrade remarkablesync

            # pip
            pip install --upgrade remarkablesync

            # Check for updates from the CLI
            reMarkableSync check-update
            ```


          files: |
            reMarkableSync-Windows.zip
            reMarkableSync-macOS.zip
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
